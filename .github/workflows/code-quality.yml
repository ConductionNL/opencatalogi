name: Code Quality

on:
  push:
    branches: [main, beta, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    types: [opened, reopened]
    branches: [main, beta, development]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  quality:
    if: github.event_name != 'push' || github.event.created != true
    uses: Conduction/.github/.github/workflows/quality.yml@main
    with:
      app-name: opencatalogi
      php-version: "8.3"
      php-test-versions: '["8.3", "8.4"]'
      nextcloud-test-refs: '["stable32"]'
      enable-psalm: true
      enable-phpstan: true
      enable-phpmetrics: true
      enable-frontend: true
      enable-eslint: true
      # PHPUnit re-enabled after the unit-suite revival. The original CI hang was
      # caused by the DirectoryService::syncDirectory / BroadcastService::broadcast
      # tests driving the SSRF outbound-URL guard, which does real DNS resolution
      # (dns_get_record / gethostbyname) and stalls on runners without outbound DNS.
      # Those tests are now tagged @group network and excluded by default in both
      # phpunit.xml and phpunit-unit.xml, so the suite is deterministic and offline-safe.
      enable-phpunit: true
      additional-apps: '[{"repo":"Conduction/openregister","app":"openregister","ref":"development"}]'
      enable-newman: false
