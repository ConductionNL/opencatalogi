name: Code Quality

on:
  push:
    branches: [main, beta, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    types: [opened, reopened]
    branches: [main, beta, development]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.event_name != 'push' || github.event.created != true
    uses: Conduction/.github/.github/workflows/quality.yml@main
    with:
      app-name: opencatalogi
      php-version: "8.3"
      php-test-versions: '["8.3", "8.4"]'
      nextcloud-test-refs: '["stable32"]'
      enable-psalm: true
      enable-phpstan: true
      enable-phpmetrics: true
      enable-frontend: true
      enable-eslint: true
      # PHPUnit temporarily disabled — unit tests hang in CI after ~61/1212
      # tests, exceeding the 1h PHP max_execution_time. Tests run fine locally
      # but something in the NC test container interaction (likely a real HTTP
      # call sneaking through despite mocks) hangs deterministically.
      # Tracked in https://github.com/ConductionNL/opencatalogi/issues — see
      # the upstream-dev-cleanup PR for context.
      enable-phpunit: false
      additional-apps: '[{"repo":"Conduction/openregister","app":"openregister","ref":"development"}]'
      enable-newman: false
