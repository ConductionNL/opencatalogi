# app-tests-live.yml — opencatalogi caller for the LIVE-NC reusable workflow.
#
# Boots a real, seeded Nextcloud (db + NC + openregister deployed/enabled +
# opencatalogi deployed/enabled), then runs the deep Playwright e2e
# (tests/e2e/workflows/) and/or the Newman API-contract suite against it as
# HARD gates. Generalised per GAP-2 (arm CI live-gating) from openregister's
# reference rig; the reusable tests-live.yml is byte-identical fleet-wide, only
# these inputs differ. Additive — does not touch app-tests.yml / release /
# pre-merge workflows.
#
# Gate status for opencatalogi (see TESTING-CI-ROLLOUT.md for the evidence table):
#   deep-e2e: false  — TODO: e2e _fixtures hardcodes REG_PUBLICATION=14 (dev numeric); resolve by slug to arm
#   newman:   false  — TODO: no tests/integration/run-newman.sh yet

name: app-tests-live

on:
  pull_request:
    branches:
      - development
      - main
      - beta
  push:
    branches:
      - development
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    uses: ./.forgejo/workflows/tests-live.yml
    with:
      app-id: opencatalogi
      is-openregister: false
      run-e2e: false
      run-newman: false
      newman-entrypoint: tests/integration/run-newman.sh
